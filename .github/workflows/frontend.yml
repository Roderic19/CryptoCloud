name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ 'src/frontend/**' ]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd src/frontend && npm install

      - name: Run Tests
        run: cd src/frontend && npx vitest run

      - name: Create Environment File
        run: |
          mkdir -p src/frontend/src/environments
          echo "export const environment = { production: true, apiUrl: '${{ secrets.AZURE_BACKEND_URL }}' };" > src/frontend/src/environments/environment.ts

      - name: Build
        run: cd src/frontend && npm run build

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/frontend/dist/CryptoCloud-Frontend/browser"
          api_location: ""
          skip_app_build: true
